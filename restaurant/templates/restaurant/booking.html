<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>Weka Akiba ya Meza - Joyfully</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card p-4 mx-auto" style="max-width: 500px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
        <h3 class="text-center mb-4 fw-bold">Joyfully Restaurant</h3>
        <h5 class="text-center text-muted mb-4">Weka Akiba ya Meza (Booking)</h5>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Jina Lako</label>
                <input type="text" name="jina" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Namba ya Simu</label>
                <input type="tel" name="simu" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Idadi ya Watu</label>
                <input type="number" name="idadi_ya_watu" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Tarehe na Muda</label>
                <input type="datetime-local" name="tarehe_na_muda" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Ujumbe (Hiari)</label>
                <textarea name="ujumbe" class="form-control" rows="2"></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">Kamilisha Booking</button>
        </form>
    </div>
</div>
</body>
</html>
