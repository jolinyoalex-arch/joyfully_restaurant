<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>Joyfully Restaurant - Menyu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .hero-section { background-color: #212529; color: white; padding: 40px 0; margin-bottom: 30px; }
        .price-badge { background-color: #ffc107; color: black; font-weight: bold; padding: 4px 8px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="hero-section text-center">
    <h2>Joyfully Restaurant</h2>
    <p>Chagua chakula chako kitamu sasa</p>
    <div class="d-flex justify-content-center gap-2">
        <a href="{% url 'cart_detail' %}" class="btn btn-warning btn-sm">Angalia Kikapu</a>
        <a href="{% url 'booking' %}" class="btn btn-outline-light btn-sm">Book Meza Hapa</a>
    </div>
</div>

<div class="container">
    <div class="row">
        {% for item in items %}
        <div class="col-md-4 mb-4">
            <div class="card p-3 shadow-sm">
                <div class="d-flex justify-content-between">
                    <h5>{{ item.name }}</h5>
                    <span class="price-badge">{{ item.price }} TZS</span>
                </div>
                <p class="text-muted small">{{ item.category }}</p>
                <p>{{ item.description }}</p>
                
                <div class="d-flex justify-content-between align-items-center mt-2">
                    <span class="badge bg-success">Ipo Tayari</span>
                    <a href="{% url 'cart_add' item.id %}" class="btn btn-primary btn-sm">Agiza</a>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-12 text-center">
            <p class="alert alert-info">Hakuna chakula kwenye menyu kwa sasa.</p>
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
